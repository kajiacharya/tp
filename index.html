
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toronto Pulse — News Card Maker</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&family=Playfair+Display:wght@700;900&family=Oswald:wght@400;600;700&family=Bebas+Neue&family=Montserrat:wght@400;600;700;900&family=Noto+Sans+Devanagari:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--panel:#181818;--border:#2a2a2a;--accent:#e63a2e;--text:#e8e8e8;--muted:#666;--canvas-w:1080;--canvas-h:1350}
body{background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;display:flex;min-height:100vh;overflow-x:hidden}

/* SIDEBAR */
.sidebar{width:320px;min-width:320px;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:0;display:flex;flex-direction:column}
.sidebar-header{padding:16px 20px;border-bottom:1px solid var(--border);background:#111}
.sidebar-header h1{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fff}
.sidebar-header p{font-size:11px;color:var(--muted);margin-top:3px}

.section{border-bottom:1px solid var(--border)}
.section-head{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#aaa}
.section-head:hover{background:#1e1e1e}
.section-body{padding:14px 20px;display:flex;flex-direction:column;gap:10px}
.section-body.hidden{display:none}

label{font-size:11px;font-weight:600;color:#888;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
input[type=text],input[type=number],select{width:100%;background:#111;border:1px solid var(--border);color:#e0e0e0;padding:7px 10px;border-radius:5px;font-size:12px;font-family:inherit}
input[type=range]{width:100%;accent-color:var(--accent)}
input[type=color]{width:36px;height:28px;padding:2px;border:1px solid var(--border);border-radius:4px;background:#111;cursor:pointer}

.row{display:flex;gap:8px;align-items:center}
.row label{margin:0;white-space:nowrap}
.color-row{display:flex;gap:6px;align-items:center}
.color-swatch{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:.15s}
.color-swatch.active{border-color:#fff}

.upload-btn{display:block;width:100%;padding:8px;background:#222;border:1px dashed #444;border-radius:5px;text-align:center;font-size:11px;color:#888;cursor:pointer;transition:.15s}
.upload-btn:hover{border-color:#666;color:#aaa}
input[type=file]{display:none}

.btn{padding:8px 14px;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#c42a20}
.btn-secondary{background:#2a2a2a;color:#ccc}
.btn-secondary:hover{background:#333}
.btn-full{width:100%}

.range-row{display:flex;gap:8px;align-items:center}
.range-val{font-size:11px;color:#888;min-width:30px;text-align:right}

textarea{width:100%;background:#111;border:1px solid var(--border);color:#e0e0e0;padding:8px 10px;border-radius:5px;font-size:12px;font-family:inherit;resize:vertical;min-height:70px}

.kw-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.kw-tag{display:flex;align-items:center;gap:4px;background:#222;border:1px solid #333;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer}
.kw-tag:hover{border-color:#555}
.kw-tag .kw-color{width:10px;height:10px;border-radius:50%}
.kw-add{display:flex;gap:6px;margin-top:6px}
.kw-add input{flex:1}

/* CANVAS AREA */
.canvas-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px;overflow:auto;background:#0a0a0a}
.canvas-controls{display:flex;gap:10px;margin-bottom:16px;align-items:center}
.canvas-wrap{position:relative}
#canvas{display:block;border:1px solid #2a2a2a;cursor:crosshair}

.size-presets{display:flex;gap:6px;flex-wrap:wrap}
.preset-btn{padding:5px 10px;background:#1a1a1a;border:1px solid #333;color:#888;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit}
.preset-btn.active{background:#2a2a2a;border-color:#555;color:#ccc}
.preset-btn:hover{background:#222;color:#aaa}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>News Card Maker</h1>
    <p>Toronto Pulse · Visual Editor</p>
  </div>

  <!-- SUBJECT PHOTO -->
  <div class="section">
    <div class="section-head" onclick="toggle(this)">📷 Subject Photo <span>▾</span></div>
    <div class="section-body">
      <label for="photoUpload">Replace photo</label>
      <label class="upload-btn" for="photoUpload">Click to upload image</label>
      <input type="file" id="photoUpload" accept="image/*" onchange="loadPhoto(this)">
      <label>Position X</label>
      <div class="range-row"><input type="range" id="photoX" min="-500" max="500" value="0" oninput="draw();photoXVal.textContent=this.value"><span id="photoXVal" class="range-val">0</span></div>
      <label>Position Y</label>
      <div class="range-row"><input type="range" id="photoY" min="-500" max="500" value="0" oninput="draw();photoYVal.textContent=this.value"><span id="photoYVal" class="range-val">0</span></div>
      <label>Scale</label>
      <div class="range-row"><input type="range" id="photoScale" min="30" max="200" value="100" oninput="draw();photoScaleVal.textContent=this.value+'%'"><span id="photoScaleVal" class="range-val">100%</span></div>
    </div>
  </div>

  <!-- BRAND BAR -->
  <div class="section">
    <div class="section-head" onclick="toggle(this)">🏷️ Brand Bar <span>▾</span></div>
    <div class="section-body">
      <label for="logoUpload">Replace logo</label>
      <label class="upload-btn" for="logoUpload">Click to upload logo</label>
      <input type="file" id="logoUpload" accept="image/*" onchange="loadLogo(this)">
      <label>Bar Position Y</label>
      <div class="range-row"><input type="range" id="barY" min="40" max="95" value="62" oninput="draw();barYVal.textContent=Math.round(this.value)+'%'"><span id="barYVal" class="range-val">62%</span></div>
      <label>Logo Size</label>
      <div class="range-row"><input type="range" id="logoSize" min="40" max="200" value="130" oninput="draw();logoSizeVal.textContent=this.value+'px'"><span id="logoSizeVal" class="range-val">130px</span></div>
      <label>Line color</label>
      <input type="color" id="lineColor" value="#ffffff" oninput="draw()">
    </div>
  </div>

  <!-- HEADLINE -->
  <div class="section">
    <div class="section-head" onclick="toggle(this)">✏️ Headline <span>▾</span></div>
    <div class="section-body">
      <label>Headline Text</label>
      <textarea id="headlineText" oninput="parseKeywords();draw()">Introducing the Revised Official Photo of Nepal's Youth Prime Minister Balen Shah</textarea>
      <label>Font</label>
      <select id="fontFamily" onchange="draw()">
        <option value="'Oswald', sans-serif">Oswald (Bold Impact)</option>
        <option value="'Montserrat', sans-serif" selected>Montserrat</option>
        <option value="'Bebas Neue', sans-serif">Bebas Neue</option>
        <option value="'Playfair Display', serif">Playfair Display</option>
        <option value="'Noto Sans Devanagari', sans-serif">Noto Sans Devanagari (नेपाली)</option>
        <option value="'Tiro Devanagari Hindi', serif">Tiro Devanagari (नेपाली)</option>
      </select>
      <label>Font Size</label>
      <div class="range-row"><input type="range" id="fontSize" min="28" max="90" value="54" oninput="draw();fontSizeVal.textContent=this.value"><span id="fontSizeVal" class="range-val">54</span></div>
      <label>Line Height</label>
      <div class="range-row"><input type="range" id="lineHeight" min="0.8" max="2.5" step="0.05" value="1.2" oninput="draw();lineHeightVal.textContent=parseFloat(this.value).toFixed(2)"><span id="lineHeightVal" class="range-val">1.20</span></div>
      <label>Text Color</label>
      <div class="color-row">
        <input type="color" id="textColor" value="#ffffff" oninput="draw()">
        <div class="color-swatch active" style="background:#fff;border-color:#333;margin-left:8px" onclick="setTextColor('#ffffff',this)"></div>
        <div class="color-swatch" style="background:#f5f5f5;border-color:#333" onclick="setTextColor('#f5f5f5',this)"></div>
        <div class="color-swatch" style="background:#111" onclick="setTextColor('#111111',this)"></div>
      </div>
      <label style="margin-top:4px">Background Fade</label>
      <select id="bgFade" onchange="draw()">
        <option value="black">Black fade (default)</option>
        <option value="dark">Dark charcoal fade</option>
        <option value="red">Red fade</option>
        <option value="blue">Blue fade</option>
        <option value="none">No fade (transparent)</option>
      </select>
      <label>Fade Opacity</label>
      <div class="range-row"><input type="range" id="fadeOpacity" min="0" max="100" value="92" oninput="draw();fadeOpVal.textContent=this.value+'%'"><span id="fadeOpVal" class="range-val">92%</span></div>
    </div>
  </div>

  <!-- KEYWORDS -->
  <div class="section">
    <div class="section-head" onclick="toggle(this)">🎨 Colored Keywords <span>▾</span></div>
    <div class="section-body">
      <p style="font-size:11px;color:#666;line-height:1.5">Click a word in the headline to colorize it, or type below.</p>
      <div id="kwTags" class="kw-tags"></div>
      <div class="kw-add">
        <input type="text" id="kwWord" placeholder="word or phrase">
        <input type="color" id="kwColor" value="#e63a2e" style="width:36px">
        <button class="btn btn-secondary" onclick="addKeyword()">Add</button>
      </div>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div class="section">
    <div class="section-head" onclick="toggle(this)">🔴 Bottom Bar <span>▾</span></div>
    <div class="section-body">
      <label>Bar Color</label>
      <div class="color-row">
        <input type="color" id="bottomBarColor" value="#e63a2e" oninput="draw()">
        <div class="color-swatch active" style="background:#e63a2e;margin-left:8px" onclick="setBottomColor('#e63a2e',this)"></div>
        <div class="color-swatch" style="background:#000" onclick="setBottomColor('#000000',this)"></div>
        <div class="color-swatch" style="background:#1a3f8f" onclick="setBottomColor('#1a3f8f',this)"></div>
        <div class="color-swatch" style="background:#1e7c2e" onclick="setBottomColor('#1e7c2e',this)"></div>
        <div class="color-swatch" style="background:#fff;border-color:#333" onclick="setBottomColor('#ffffff',this)"></div>
      </div>
      <label>Bar Height</label>
      <div class="range-row"><input type="range" id="bottomBarH" min="4" max="40" value="14" oninput="draw();bottomBarHVal.textContent=this.value+'px'"><span id="bottomBarHVal" class="range-val">14px</span></div>
    </div>
  </div>

  <!-- CANVAS SIZE -->
  <div class="section">
    <div class="section-head" onclick="toggle(this)">📐 Canvas Size <span>▾</span></div>
    <div class="section-body">
      <label>Presets</label>
      <div class="size-presets">
        <button class="preset-btn active" onclick="setSize(1080,1350,this)">1080×1350<br><span style="font-size:9px;color:#666">Instagram Portrait</span></button>
        <button class="preset-btn" onclick="setSize(1080,1080,this)">1080×1080<br><span style="font-size:9px;color:#666">Square</span></button>
        <button class="preset-btn" onclick="setSize(1080,1920,this)">1080×1920<br><span style="font-size:9px;color:#666">Stories</span></button>
        <button class="preset-btn" onclick="setSize(1200,675,this)">1200×675<br><span style="font-size:9px;color:#666">Twitter/FB</span></button>
      </div>
      <div class="row" style="margin-top:8px">
        <div style="flex:1"><label>Width</label><input type="number" id="cw" value="1080" onchange="setCustomSize()"></div>
        <div style="flex:1"><label>Height</label><input type="number" id="ch" value="1350" onchange="setCustomSize()"></div>
      </div>
    </div>
  </div>

  <!-- EXPORT -->
  <div class="section">
    <div class="section-head" onclick="toggle(this)">💾 Export <span>▾</span></div>
    <div class="section-body">
      <button class="btn btn-primary btn-full" onclick="exportCard()">Download PNG</button>
      <button class="btn btn-secondary btn-full" style="margin-top:6px" onclick="exportCard('jpg')">Download JPG</button>
    </div>
  </div>
</div>

<!-- CANVAS -->
<div class="canvas-area">
  <div class="canvas-controls">
    <span style="font-size:11px;color:#555">Preview (scaled)</span>
    <select id="zoomLevel" onchange="updateZoom()" style="background:#1a1a1a;border:1px solid #333;color:#888;padding:4px 8px;border-radius:4px;font-size:11px">
      <option value="0.3">30%</option>
      <option value="0.4" selected>40%</option>
      <option value="0.5">50%</option>
      <option value="0.6">60%</option>
      <option value="0.75">75%</option>
      <option value="1">100%</option>
    </select>
  </div>
  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>
</div>

let photoImg = new Image();
let logoImg = new Image();
let CW = 1080, CH = 1350;
let keywords = [];
let zoom = 0.4;

photoImg.onload = draw;
logoImg.onload = draw;
photoImg.src = DEFAULT_SUBJECT;
logoImg.src = DEFAULT_LOGO;

function draw() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = CW;
  canvas.height = CH;
  canvas.style.width = (CW * zoom) + 'px';
  canvas.style.height = (CH * zoom) + 'px';

  // Background
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, CW, CH);

  // Subject photo
  if (photoImg.complete && photoImg.naturalWidth) {
    const px = parseFloat(document.getElementById('photoX').value);
    const py = parseFloat(document.getElementById('photoY').value);
    const ps = parseFloat(document.getElementById('photoScale').value) / 100;
    const iw = photoImg.naturalWidth, ih = photoImg.naturalHeight;
    const scale = Math.max(CW / iw, CH / ih) * ps;
    const dw = iw * scale, dh = ih * scale;
    const dx = (CW - dw) / 2 + px;
    const dy = (CH - dh) / 2 + py;
    ctx.drawImage(photoImg, dx, dy, dw, dh);
  }

  // Fade overlay — tied to barY position
  const barYpct = parseFloat(document.getElementById('barY').value) / 100;
  const fadeType = document.getElementById('bgFade').value;
  if (fadeType !== 'none') {
    const barYpx0 = barYpct * CH;
    // Fade starts 450px above the brand bar, ends at brand bar (fully black)
    const fadeZoneStart = Math.max(0, barYpx0 - 450);
    const fadeZoneEnd   = barYpx0;
    const grad = ctx.createLinearGradient(0, fadeZoneStart, 0, fadeZoneEnd);
    grad.addColorStop(0,    'rgba(0,0,0,0)');
    grad.addColorStop(0.35, 'rgba(0,0,0,0.15)');
    grad.addColorStop(0.60, 'rgba(0,0,0,0.55)');
    grad.addColorStop(0.80, 'rgba(0,0,0,0.88)');
    grad.addColorStop(1,    'rgba(0,0,0,1)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, fadeZoneStart, CW, CH - fadeZoneStart);
    // Solid black from bar down to bottom
    ctx.fillStyle = 'rgba(0,0,0,1)';
    ctx.fillRect(0, fadeZoneEnd, CW, CH - fadeZoneEnd);
  }

  // Brand bar
  const barYpx = barYpct * CH;
  const lineColor = document.getElementById('lineColor').value;

  // Logo in brand bar — no top gap, logo sits right at barYpx
  const logoSizePx = parseInt(document.getElementById('logoSize').value);
  if (logoImg.complete && logoImg.naturalWidth) {
    const logoH = logoSizePx;
    const logoW = logoImg.naturalWidth * (logoH / logoImg.naturalHeight);
    const logoX = CW / 2 - logoW / 2;
    const logoY = barYpx;
    ctx.drawImage(logoImg, logoX, logoY, logoW, logoH);
  }

  // Lines beside logo — centered vertically through logo
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = 10;
  const logoH2 = logoSizePx, logoW2 = logoImg.naturalWidth * (logoH2 / logoImg.naturalHeight);
  const logoX2 = CW / 2 - logoW2 / 2;
  const lineY = barYpx + logoH2 / 2;
  ctx.beginPath(); ctx.moveTo(60, lineY); ctx.lineTo(logoX2 - 20, lineY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(CW / 2 + logoW2 / 2 + 20, lineY); ctx.lineTo(CW - 60, lineY); ctx.stroke();

  // Headline text — gap: bottom of logo + 30px
  const textY = barYpx + logoSizePx + 30;
  const fontFamily = document.getElementById('fontFamily').value;
  const fontSize = parseInt(document.getElementById('fontSize').value);
  const textColor = document.getElementById('textColor').value;
  const headline = document.getElementById('headlineText').value;

  ctx.font = `900 ${fontSize}px ${fontFamily}`;
  ctx.textAlign = 'center';
  const maxW = CW - 120;

  // Word-wrap + keyword coloring
  const words = headline.split(' ');
  const lines = [];
  let current = '';
  for (let i = 0; i < words.length; i++) {
    const test = current ? current + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width > maxW && current) {
      lines.push(current);
      current = words[i];
    } else current = test;
  }
  if (current) lines.push(current);

  const lineH = fontSize * parseFloat(document.getElementById('lineHeight').value);
  let ty = textY + fontSize;
  for (const line of lines) {
    drawColoredLine(ctx, line, CW / 2, ty, fontSize, fontFamily, textColor, maxW);
    ty += lineH;
  }

  // Bottom bar
  const bbH = parseInt(document.getElementById('bottomBarH').value);
  const bbColor = document.getElementById('bottomBarColor').value;
  ctx.fillStyle = bbColor;
  ctx.fillRect(0, CH - bbH, CW, bbH);
}

function drawColoredLine(ctx, line, cx, y, size, family, defaultColor, maxW) {
  if (keywords.length === 0) {
    ctx.fillStyle = defaultColor;
    ctx.font = `900 ${size}px ${family}`;
    ctx.fillText(line, cx, y);
    return;
  }

  // Tokenize
  const tokens = [];
  let remaining = line;
  while (remaining.length > 0) {
    let matched = false;
    for (const kw of keywords) {
      const idx = remaining.toLowerCase().indexOf(kw.word.toLowerCase());
      if (idx === 0) {
        tokens.push({text: remaining.substring(0, kw.word.length), color: kw.color, bold: true});
        remaining = remaining.substring(kw.word.length);
        matched = true;
        break;
      }
    }
    if (!matched) {
      const nextMatch = findNextKeyword(remaining);
      if (nextMatch > 0) {
        tokens.push({text: remaining.substring(0, nextMatch), color: defaultColor, bold: false});
        remaining = remaining.substring(nextMatch);
      } else {
        tokens.push({text: remaining, color: defaultColor, bold: false});
        remaining = '';
      }
    }
  }

  // Measure total width
  let totalW = 0;
  for (const t of tokens) {
    ctx.font = `900 ${size}px ${family}`;
    totalW += ctx.measureText(t.text).width;
  }
  let x = cx - totalW / 2;
  for (const t of tokens) {
    ctx.font = `900 ${size}px ${family}`;
    ctx.fillStyle = t.color;
    ctx.textAlign = 'left';
    ctx.fillText(t.text, x, y);
    x += ctx.measureText(t.text).width;
  }
  ctx.textAlign = 'center';
}

function findNextKeyword(str) {
  let earliest = str.length;
  for (const kw of keywords) {
    const idx = str.toLowerCase().indexOf(kw.word.toLowerCase());
    if (idx > 0 && idx < earliest) earliest = idx;
  }
  return earliest;
}

function parseKeywords() { draw(); }

function addKeyword() {
  const word = document.getElementById('kwWord').value.trim();
  const color = document.getElementById('kwColor').value;
  if (!word) return;
  const existing = keywords.findIndex(k => k.word.toLowerCase() === word.toLowerCase());
  if (existing >= 0) keywords[existing].color = color;
  else keywords.push({word, color});
  renderKwTags();
  draw();
  document.getElementById('kwWord').value = '';
}

function removeKeyword(i) {
  keywords.splice(i, 1);
  renderKwTags();
  draw();
}

function renderKwTags() {
  const container = document.getElementById('kwTags');
  container.innerHTML = '';
  keywords.forEach((kw, i) => {
    const tag = document.createElement('div');
    tag.className = 'kw-tag';
    tag.innerHTML = `<span class="kw-color" style="background:${kw.color}"></span><span>${kw.word}</span><span style="color:#666;margin-left:2px" onclick="removeKeyword(${i})">✕</span>`;
    container.appendChild(tag);
  });
}

function loadPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { photoImg = new Image(); photoImg.onload = draw; photoImg.src = e.target.result; };
  reader.readAsDataURL(file);
}

function loadLogo(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { logoImg = new Image(); logoImg.onload = draw; logoImg.src = e.target.result; };
  reader.readAsDataURL(file);
}

function setSize(w, h, btn) {
  CW = w; CH = h;
  document.getElementById('cw').value = w;
  document.getElementById('ch').value = h;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  draw();
}

function setCustomSize() {
  CW = parseInt(document.getElementById('cw').value) || 1080;
  CH = parseInt(document.getElementById('ch').value) || 1350;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  draw();
}

function updateZoom() {
  zoom = parseFloat(document.getElementById('zoomLevel').value);
  draw();
}

function setTextColor(c, el) {
  document.getElementById('textColor').value = c;
  el.parentNode.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  draw();
}

function setBottomColor(c, el) {
  document.getElementById('bottomBarColor').value = c;
  el.parentNode.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  draw();
}

function toggle(head) {
  const body = head.nextElementSibling;
  body.classList.toggle('hidden');
  head.querySelector('span:last-child').textContent = body.classList.contains('hidden') ? '▸' : '▾';
}

function exportCard(format) {
  const canvas = document.getElementById('canvas');
  const type = format === 'jpg' ? 'image/jpeg' : 'image/png';
  const ext = format === 'jpg' ? 'jpg' : 'png';
  const link = document.createElement('a');
  link.download = `toronto-pulse-card.${ext}`;
  link.href = canvas.toDataURL(type, 0.95);
  link.click();
}

// Default keywords
keywords = [
  {word: 'Official Photo', color: '#e63a2e'},
  {word: 'Balen Shah', color: '#f5c518'}
];
renderKwTags();

draw();
